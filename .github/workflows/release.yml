name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            args: --linux
          - os: windows-latest
            platform: win
            args: --win
          - os: macos-latest
            platform: mac
            args: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder ${{ matrix.args }}

      - name: Clean artifacts (keep only installers)
        shell: bash
        run: |
          cd release
          rm -f *.blockmap *.yml *.yaml builder-*.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.exe
            release/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
